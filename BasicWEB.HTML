 <!DOCTYPE html>
 <html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My first Webpage</title>
    <style>
body {
font-family: Arial, sans-serif;
text-align: center;
background-color: #f4f4f4;
}

h1 {
color: #333;
}

button {
padding: 10px 20px;
font-size: 16px;
cursor: pointer;
background-color: #007bff;
color: white;
border: none;
border-radius: 5px;
}

    </style>
</head>
<body>
    <h1 id="title">Hello, World!</h1>
    <p>This is a basic website structure.</p>
    <button id="colorBtn">Change Title Color</button>

    <script>
        // Select the button and heading elements
const button = document.getElementById('colorBtn');
const title = document.getElementById('title');

// Add a click event to the button
button.addEventListener('click', () => {
    // Change the color of the heading
    title.style.color = title.style.color === 'red' ? '#333' : 'red';
});


</script>
</body>
</html>
