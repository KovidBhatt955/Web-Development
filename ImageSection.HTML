<!DOCTYPE html>
<html>
    <head>
      <style>
        /* Container styling */
    .image-gallery {
        padding: 20px;
        text-align: center;
    }
    
    .gallery-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px; /* Space between items */
    }

    /* Individual gallery item styling */
    .gallery-item {
        width: 300px;
        border: 1px solid #ccc;
        border-radius: 8px;
        overflow: hidden;
        transition: transform 0.3s ease;
    }

    /* Responsive Image handling */
    .gallery-item img {
        width: 100%;
        height: auto;
        display: block;
    }

    /* Captain styling */
    .captain {
        padding: 10px;
        background-color: #f9f9f9;
    }

    /* Hover effect */
    .gallery-item:hover {
        transform: scale(1.05); /* Slight zoom or hover */
        border-color: #777;
    }

      </style>
    </head>
    <body>
<!-- Image Gallery Section -->
 <section class="image-gallery">
    <h2>Our Portfolio</h2>
    <div class="gallery-container">
     <div class="gallery-item">
        <img src="IMG_20190726_193859.jpg" alt="Description of Image 1">
        <div class="caption">Image Caption 1</div>
     </div>
     <div class="gallery-item">
        <img src="single-ripe-strawberry-fruit-25754001.webp" alt="Description of Image 2">
     </div>
     <div class="gallery-item">
     <img src="single-pear-fruit-close-up-vector-46400451.jpg" alt="Description of Image 3">
     </div>
    </div>
 </section>
    </body>
</html>
